<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Data Dashboard | CMP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <main class="app-page">

        <header class="topbar">
            <div class="topbar-brand">
                <div class="topbar-logo">C</div>
                <div>
                    <div class="topbar-title">CMP Operation App</div>
                    <small class="text-muted">Data Dashboard</small>
                </div>
            </div>

            <div class="topbar-actions">

                <button type="button" class="theme-toggle" data-theme-toggle>
                    Dark Mode
                </button>

                <div class="settings-wrapper">
                    <button type="button" class="settings-btn" id="settingsButton">
                        <span class="settings-icon">⚙</span>
                        <span>Settings</span>
                    </button>

                    <div class="settings-dropdown" id="settingsDropdown">
                        <div class="settings-dropdown-header">Settings</div>

                        <a href="{{ url_for('logout') }}" class="settings-dropdown-item logout-item">
                            Log Out
                        </a>
                    </div>
                </div>

            </div>
        </header>

        <section class="page-container">

            <div class="page-header">
                <h1 class="page-title">Welcome, {{ name }}</h1>
                <p class="page-subtitle">
                    Logged in as {{ role }} | {{ email }}
                </p>
            </div>

            <div class="grid grid-4">

                <div class="card dashboard-card dashboard-card-purple">
                    <div class="dashboard-card-icon">📤</div>
                    <h2 class="card-title">Data Upload</h2>
                    <p class="card-subtitle">Manage operation data</p>
                    <h3 class="dashboard-card-value">Ready</h3>
                </div>

                <div class="card dashboard-card dashboard-card-blue">
                    <div class="dashboard-card-icon">🖥️</div>
                    <h2 class="card-title">Server Info</h2>
                    <p class="card-subtitle">Server-related records</p>
                    <h3 class="dashboard-card-value">Active</h3>
                </div>

                <div class="card dashboard-card dashboard-card-green">
                    <div class="dashboard-card-icon">✅</div>
                    <h2 class="card-title">Validation</h2>
                    <p class="card-subtitle">Data quality checks</p>
                    <h3 class="dashboard-card-value">Live</h3>
                </div>

                <div class="card dashboard-card dashboard-card-orange">
                    <div class="dashboard-card-icon">📊</div>
                    <h2 class="card-title">Reports</h2>
                    <p class="card-subtitle">Prepare and view reports</p>
                    <h3 class="dashboard-card-value">View</h3>
                </div>

            </div>

        </section>

    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
